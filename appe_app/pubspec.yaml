name: appe
description: "Techbird Appe — Mobile App for Frappe & ERPNext"
publish_to: 'none'

# Mirrors the original com.kameshkumar.appe v1.5.4 (versionCode 35).
version: 1.5.4+35

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1              # Plus Jakarta Sans (enterprise type system)

  # --- WebView shell (the app's core: renders the Frappe/ERPNext site) ---
  flutter_inappwebview: ^6.1.5

  # --- Maps (employee location view) ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # --- PDF viewing ---
  syncfusion_flutter_pdfviewer: ^28.2.6

  # --- Icons ---
  font_awesome_flutter: ^10.8.0

  # --- Native features inferred from APK permissions/libs ---
  geolocator: ^13.0.2                 # ACCESS_FINE/COARSE/BACKGROUND_LOCATION
  flutter_background_service: ^5.1.0  # FOREGROUND_SERVICE_LOCATION (15-min tracking)
  local_auth: ^2.3.0                  # USE_BIOMETRIC / USE_FINGERPRINT
  mobile_scanner: ^6.0.2              # ML Kit barcode scanning (libbarhopper)
  permission_handler: ^11.3.1
  firebase_core: ^3.8.1               # FCM (C2D_MESSAGE / play-services-cloud-messaging)
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2   # encrypted credential storage for auto-login
  http: ^1.2.2
  url_launcher: ^6.3.1                # whatsapp / external links
  package_info_plus: ^8.1.1
  device_info_plus: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/ai_images/
